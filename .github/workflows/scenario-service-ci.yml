name: Scenario Service CI

on:
  pull_request:
    paths:
      - ".github/workflows/scenario-service-ci.yml"
      - ".python-version"
      - "pyproject.toml"
      - "uv.lock"
      - "services/scenario-service/**"
      - "docs/services/scenario-service/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/scenario-service-ci.yml"
      - ".python-version"
      - "pyproject.toml"
      - "uv.lock"
      - "services/scenario-service/**"
      - "docs/services/scenario-service/**"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: scenario_service
          POSTGRES_PASSWORD: scenario_service
          POSTGRES_DB: scenario_service_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_TEST_URL: postgresql+psycopg://scenario_service:scenario_service@127.0.0.1:5432/scenario_service_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.16"
          enable-cache: true
      - run: uv python install 3.13
      - run: uv sync --all-packages --group dev --locked
      - run: uv run ruff format --check services/scenario-service
      - run: uv run ruff check services/scenario-service
      - run: uv run mypy --config-file services/scenario-service/pyproject.toml services/scenario-service/app services/scenario-service/scripts
        env:
          MYPYPATH: services/scenario-service
      - run: uv run pytest
        working-directory: services/scenario-service
        env:
          DATABASE_TEST_URL: postgresql+psycopg://scenario_service:scenario_service@127.0.0.1:5432/scenario_service_test
          PYTHONPATH: .
      - run: uv run python services/scenario-service/scripts/validate_openapi.py
      - run: docker build -f services/scenario-service/Dockerfile .
