openapi: 3.1.0
info:
  title: Cyber Range Identity Service
  version: 0.1.0
  description: Implemented milestone-one internal identity contract.
servers:
  - url: /
paths:
  /health/live:
    get:
      operationId: getLiveness
      responses:
        "200":
          description: Process is live
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /health/ready:
    get:
      operationId: getReadiness
      responses:
        "200":
          description: Process is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /internal/v1/auth/login:
    post:
      operationId: login
      security:
        - internalAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated token response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "504":
          $ref: "#/components/responses/GatewayTimeout"
  /internal/v1/auth/refresh:
    post:
      operationId: refresh
      security:
        - internalAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Refreshed token response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "504":
          $ref: "#/components/responses/GatewayTimeout"
  /internal/v1/auth/logout:
    post:
      operationId: logout
      security:
        - internalAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Session logged out
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "504":
          $ref: "#/components/responses/GatewayTimeout"
  /internal/v1/auth/session-context:
    get:
      operationId: getSessionContext
      security:
        - internalAuth: []
      parameters:
        - name: subject_id
          in: query
          required: true
          schema:
            type: string
        - name: session_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Platform session context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionContext"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /internal/v1/authorization/decisions:
    post:
      operationId: decideAuthorization
      security:
        - internalAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorizationDecisionRequest"
      responses:
        "200":
          description: Authorization decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationDecision"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /internal/v1/tenants:
    post:
      operationId: createTenant
      security:
        - internalAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
      responses:
        "201":
          description: Tenant created
        "409":
          $ref: "#/components/responses/Conflict"
  /internal/v1/users:
    post:
      operationId: createUser
      security:
        - internalAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
        "409":
          $ref: "#/components/responses/Conflict"
  /internal/v1/tenants/{tenant_id}/memberships:
    post:
      operationId: assignMembership
      security:
        - internalAuth: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignMembershipRequest"
      responses:
        "201":
          description: Membership assigned
        "409":
          $ref: "#/components/responses/Conflict"
  /internal/v1/role-assignments:
    post:
      operationId: assignRole
      security:
        - internalAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignRoleRequest"
      responses:
        "201":
          description: Role assigned
        "409":
          $ref: "#/components/responses/Conflict"
components:
  securitySchemes:
    internalAuth:
      type: apiKey
      in: header
      name: X-Internal-Auth-Mode
  responses:
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Caller lacks permission
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Required dependency unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    GatewayTimeout:
      description: Required dependency timed out
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    Health:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password, tenant_id]
      properties:
        email:
          type: string
        password:
          type: string
        tenant_id:
          type: string
    RefreshRequest:
      type: object
      additionalProperties: false
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    LogoutRequest:
      type: object
      additionalProperties: false
      required: [access_token]
      properties:
        access_token:
          type: string
    AuthTokenResponse:
      type: object
      additionalProperties: false
      required: [access_token, refresh_token, token_type, expires_in, subject_id, tenant_id, scopes]
      properties:
        access_token:
          type: string
        refresh_token:
          type: [string, "null"]
        token_type:
          type: string
        expires_in:
          type: integer
          minimum: 0
        subject_id:
          type: string
        tenant_id:
          type: string
        scopes:
          type: array
          items:
            type: string
    SessionContext:
      type: object
      additionalProperties: false
      required: [subject_id, tenant_id, scopes]
      properties:
        subject_id:
          type: string
        tenant_id:
          type: string
        scopes:
          type: array
          items:
            type: string
    AuthorizationDecisionRequest:
      type: object
      additionalProperties: false
      required: [subject_id, tenant_id, action, resource, workload_id]
      properties:
        subject_id:
          type: string
        tenant_id:
          type: string
        action:
          type: string
        resource:
          type: object
          additionalProperties: false
          properties:
            type:
              type: [string, "null"]
            id:
              type: [string, "null"]
        workload_id:
          type: string
    AuthorizationDecision:
      type: object
      additionalProperties: false
      required: [decision, reason, policy_version, audit_id]
      properties:
        decision:
          type: string
          enum: [allow, deny]
        reason:
          type: string
        policy_version:
          type: string
        audit_id:
          type: string
    CreateTenantRequest:
      type: object
      additionalProperties: false
      required: [tenant_id, slug, display_name]
      properties:
        tenant_id:
          type: string
        slug:
          type: string
        display_name:
          type: string
    CreateUserRequest:
      type: object
      additionalProperties: false
      required: [user_id, email]
      properties:
        user_id:
          type: string
        supabase_user_id:
          type: [string, "null"]
        email:
          type: string
        display_name:
          type: [string, "null"]
        create_supabase_user:
          type: boolean
          default: false
        password:
          type: [string, "null"]
    AssignMembershipRequest:
      type: object
      additionalProperties: false
      required: [user_id]
      properties:
        membership_id:
          type: [string, "null"]
        user_id:
          type: string
    AssignRoleRequest:
      type: object
      additionalProperties: false
      required: [membership_id, role_code]
      properties:
        role_assignment_id:
          type: [string, "null"]
        membership_id:
          type: string
        role_code:
          type: string
    ErrorDetail:
      type: object
      additionalProperties: true
    Error:
      type: object
      additionalProperties: false
      required: [code, message, correlation_id, details]
      properties:
        code:
          type: string
        message:
          type: string
        correlation_id:
          type: string
        details:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetail"
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/Error"
