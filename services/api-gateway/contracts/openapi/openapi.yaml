openapi: 3.1.0
info:
  title: Cyber Range API Gateway
  version: 0.1.0
  description: Implemented public HTTP contract.
servers:
  - url: /
security:
  - oidc: []
paths:
  /health/live:
    get:
      operationId: getLiveness
      security: []
      responses:
        "200":
          description: Process is live
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /health/ready:
    get:
      operationId: getReadiness
      security: []
      responses:
        "200":
          description: Process is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/auth/login:
    post:
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Supabase token response with platform context
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/CorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "504":
          $ref: "#/components/responses/GatewayTimeout"
  /api/v1/auth/refresh:
    post:
      operationId: refresh
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Refreshed Supabase token response with platform context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "504":
          $ref: "#/components/responses/GatewayTimeout"
  /api/v1/auth/logout:
    post:
      operationId: logout
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Session logged out
        "401":
          $ref: "#/components/responses/Unauthorized"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "504":
          $ref: "#/components/responses/GatewayTimeout"
  /api/v1/auth/me:
    get:
      operationId: getMe
      security:
        - supabaseJwt: []
      responses:
        "200":
          description: Current platform subject context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/scenarios:
    get:
      operationId: listScenarios
      security:
        - supabaseJwt: [scenarios:read]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Tenant-visible scenario page
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/CorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "504":
          $ref: "#/components/responses/GatewayTimeout"
  /api/v1/matches:
    post:
      operationId: createMatch
      security:
        - supabaseJwt: [matches:create]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMatchRequest"
      responses:
        "200":
          description: Match created or idempotently replayed
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/CorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "504":
          $ref: "#/components/responses/GatewayTimeout"
  /api/v1/matches/{match_id}:
    get:
      operationId: getMatch
      security:
        - supabaseJwt: [matches:read]
      parameters:
        - $ref: "#/components/parameters/MatchId"
      responses:
        "200":
          description: Match status
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/CorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/matches/{match_id}/cancel:
    post:
      operationId: cancelMatch
      security:
        - supabaseJwt: [matches:cancel]
      parameters:
        - $ref: "#/components/parameters/MatchId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelMatchRequest"
      responses:
        "200":
          description: Match cancelled
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/CorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "504":
          $ref: "#/components/responses/GatewayTimeout"
components:
  securitySchemes:
    supabaseJwt:
      type: openIdConnect
      openIdConnectUrl: http://127.0.0.1:9999/auth/v1/.well-known/openid-configuration
  headers:
    CorrelationId:
      description: Request correlation identifier
      schema:
        type: string
  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    MatchId:
      name: match_id
      in: path
      required: true
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
  responses:
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Caller lacks permission
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Request conflicts with current state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Request fields are invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadGateway:
      description: Invalid downstream response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Required dependency is unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    GatewayTimeout:
      description: Required dependency timed out
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    Health:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password, tenant_id]
      properties:
        email:
          type: string
        password:
          type: string
        tenant_id:
          type: string
    RefreshRequest:
      type: object
      additionalProperties: false
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    LogoutRequest:
      type: object
      additionalProperties: false
      required: [access_token]
      properties:
        access_token:
          type: string
    AuthTokenResponse:
      type: object
      additionalProperties: false
      required: [access_token, refresh_token, token_type, expires_in, subject_id, tenant_id, scopes]
      properties:
        access_token:
          type: string
        refresh_token:
          type: [string, "null"]
        token_type:
          type: string
        expires_in:
          type: integer
          minimum: 0
        subject_id:
          type: string
        tenant_id:
          type: string
        scopes:
          type: array
          items:
            type: string
    Me:
      type: object
      additionalProperties: false
      required: [subject_id, tenant_id, scopes]
      properties:
        subject_id:
          type: string
        tenant_id:
          type: string
        scopes:
          type: array
          items:
            type: string
    Scenario:
      type: object
      additionalProperties: false
      required:
        - id
        - latest_version
        - title
        - summary
        - difficulty
        - category
        - tags
        - estimated_duration_minutes
        - status
      properties:
        id:
          type: string
        latest_version:
          type: string
        title:
          type: string
        summary:
          type: string
        difficulty:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        estimated_duration_minutes:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [published]
    ScenarioPage:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Scenario"
        next_cursor:
          type: [string, "null"]
    CreateMatchRequest:
      type: object
      additionalProperties: false
      required: [scenario_id]
      properties:
        scenario_id:
          type: string
        scenario_version:
          type: [string, "null"]
    CancelMatchRequest:
      type: object
      additionalProperties: false
      properties:
        reason:
          type: string
          default: user_requested
    MatchScenario:
      type: object
      additionalProperties: false
      required: [id, version, snapshot_id, title]
      properties:
        id:
          type: string
        version:
          type: string
        snapshot_id:
          type: string
        title:
          type: string
    Match:
      type: object
      additionalProperties: false
      required:
        - id
        - tenant_id
        - subject_id
        - scenario
        - state
        - phase
        - status_reason
        - created_at
        - updated_at
        - cancelled_at
        - completed_at
        - failed_at
      properties:
        id:
          type: string
        tenant_id:
          type: string
        subject_id:
          type: string
        scenario:
          $ref: "#/components/schemas/MatchScenario"
        state:
          type: string
        phase:
          type: string
        status_reason:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        cancelled_at:
          type: [string, "null"]
          format: date-time
        completed_at:
          type: [string, "null"]
          format: date-time
        failed_at:
          type: [string, "null"]
          format: date-time
    ErrorDetail:
      type: object
      additionalProperties: true
    Error:
      type: object
      additionalProperties: false
      required: [code, message, correlation_id, details]
      properties:
        code:
          type: string
        message:
          type: string
        correlation_id:
          type: string
        details:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetail"
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/Error"
