openapi: 3.1.0
info:
  title: Cyber Range Red Agent Service
  version: 0.1.0
servers:
  - url: http://127.0.0.1:9104
paths:
  /health/live:
    get:
      tags: [health]
      operationId: live
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /health/ready:
    get:
      tags: [health]
      operationId: ready
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /internal/v1/red-runs:
    post:
      tags: [red-runs]
      operationId: startRedRun
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/InternalAuthMode"
        - $ref: "#/components/parameters/InternalWorkloadId"
        - $ref: "#/components/parameters/InternalSubjectId"
        - $ref: "#/components/parameters/InternalTenantId"
        - $ref: "#/components/parameters/InternalScopes"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartRedRunRequest"
      responses:
        "201":
          description: Red run created and proposal produced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedRunResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "504":
          $ref: "#/components/responses/GatewayTimeout"
  /internal/v1/red-runs/{red_run_id}:
    get:
      tags: [red-runs]
      operationId: getRedRun
      parameters:
        - name: red_run_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/InternalAuthMode"
        - $ref: "#/components/parameters/InternalWorkloadId"
        - $ref: "#/components/parameters/InternalSubjectId"
        - $ref: "#/components/parameters/InternalTenantId"
        - $ref: "#/components/parameters/InternalScopes"
      responses:
        "200":
          description: Red run status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedRunResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  parameters:
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: true
      schema:
        type: string
    InternalAuthMode:
      name: X-Internal-Auth-Mode
      in: header
      required: true
      schema:
        type: string
        enum: [local]
    InternalWorkloadId:
      name: X-Internal-Workload-ID
      in: header
      required: true
      schema:
        type: string
        enum: [match-orchestrator-service]
    InternalSubjectId:
      name: X-Internal-Subject-ID
      in: header
      required: true
      schema:
        type: string
    InternalTenantId:
      name: X-Internal-Tenant-ID
      in: header
      required: true
      schema:
        type: string
    InternalScopes:
      name: X-Internal-Scopes
      in: header
      required: true
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
  responses:
    Unauthorized:
      description: Internal authentication is missing or invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Caller is not authorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Red run was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Request conflicts with current state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadGateway:
      description: Agent returned an invalid response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Agent or database is unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    GatewayTimeout:
      description: Agent timed out
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    StartRedRunRequest:
      type: object
      required:
        - match_id
        - sandbox_id
        - scenario
        - target_profile
        - action_policy
        - resource_budget
      additionalProperties: false
      properties:
        match_id:
          type: string
        sandbox_id:
          type: string
        scenario:
          $ref: "#/components/schemas/RedScenario"
        target_profile:
          type: object
          additionalProperties: true
        action_policy:
          type: object
          additionalProperties: true
        resource_budget:
          type: object
          additionalProperties: true
        agent_profile_ref:
          type: string
    RedScenario:
      type: object
      required: [snapshot_id, scenario_id, version, title]
      additionalProperties: false
      properties:
        snapshot_id:
          type: string
        scenario_id:
          type: string
        version:
          type: string
        title:
          type: string
    Agent:
      type: object
      required: [adapter, profile_ref]
      properties:
        adapter:
          type: string
        profile_ref:
          type: string
    AttackProposal:
      type: object
      required:
        - proposal_id
        - proposal_type
        - title
        - summary
        - rationale
        - action
        - expected_signal
        - risk_level
        - confidence
      properties:
        proposal_id:
          type: string
        proposal_type:
          type: string
          enum: [http_request]
        title:
          type: string
        summary:
          type: string
        rationale:
          type: string
        action:
          type: object
          additionalProperties: true
        expected_signal:
          type: string
        risk_level:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
    RedRunResponse:
      type: object
      required:
        - id
        - tenant_id
        - subject_id
        - match_id
        - sandbox_id
        - scenario
        - state
        - status_reason
        - agent
        - proposal
        - created_at
        - updated_at
        - completed_at
        - failed_at
      properties:
        id:
          type: string
        tenant_id:
          type: string
        subject_id:
          type: string
        match_id:
          type: string
        sandbox_id:
          type: string
        scenario:
          $ref: "#/components/schemas/RedScenario"
        state:
          type: string
        status_reason:
          type: string
        agent:
          $ref: "#/components/schemas/Agent"
        proposal:
          anyOf:
            - $ref: "#/components/schemas/AttackProposal"
            - type: "null"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        completed_at:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        failed_at:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
    ErrorBody:
      type: object
      required: [code, message, correlation_id, details]
      properties:
        code:
          type: string
        message:
          type: string
        correlation_id:
          type: string
        details:
          type: array
          items:
            type: object
            additionalProperties: true
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"

