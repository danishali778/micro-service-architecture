openapi: 3.1.0
info:
  title: Cyber Range Scenario Service
  version: 0.1.0
  description: Implemented milestone-one internal scenario catalog contract.
servers:
  - url: /
paths:
  /health/live:
    get:
      operationId: getLiveness
      security: []
      responses:
        "200":
          description: Process is live
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /health/ready:
    get:
      operationId: getReadiness
      security: []
      responses:
        "200":
          description: Process is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /internal/v1/scenarios:
    get:
      operationId: listScenarios
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Tenant-visible published scenario page
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/CorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
components:
  headers:
    CorrelationId:
      description: Request correlation identifier
      schema:
        type: string
  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
  responses:
    Unauthorized:
      description: Missing or invalid internal authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Caller lacks permission
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Request fields are invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Required dependency is unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    Health:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    Scenario:
      type: object
      additionalProperties: false
      required:
        - id
        - latest_version
        - title
        - summary
        - difficulty
        - category
        - tags
        - estimated_duration_minutes
        - status
      properties:
        id:
          type: string
        latest_version:
          type: string
        title:
          type: string
        summary:
          type: string
        difficulty:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        estimated_duration_minutes:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [published]
    ScenarioPage:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Scenario"
        next_cursor:
          type: [string, "null"]
    ErrorDetail:
      type: object
      additionalProperties: true
    Error:
      type: object
      additionalProperties: false
      required: [code, message, correlation_id, details]
      properties:
        code:
          type: string
        message:
          type: string
        correlation_id:
          type: string
        details:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetail"
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/Error"
